<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VFO</title>
  <style>
    :root {
      --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-input: #0d0d1a;
      --bg-hover: #1a4080; --bg-btn: #2a2a4a; --bg-btn-hover: #3a3a5a;
      --border: #3a3a5a; --border-accent: #4fc3f7;
      --text-primary: #e0e0e0; --text-secondary: #aaa; --text-dim: #888; --text-dimmer: #666;
      --accent-blue: #4fc3f7; --accent-green: #4ecca3; --accent-red: #e94560;
      --accent-gold: #ffd740;
    }
    [data-theme="light"] {
      --bg-primary: #f0f2f5; --bg-secondary: #ffffff; --bg-input: #ffffff;
      --bg-hover: #d0d4da; --bg-btn: #e0e2e8; --bg-btn-hover: #d0d4da;
      --border: #c0c4cc; --border-accent: #1976d2;
      --text-primary: #1a1a2e; --text-secondary: #4a4a6a; --text-dim: #6a6a80; --text-dimmer: #8a8a9a;
      --accent-blue: #1976d2; --accent-green: #2e7d5a; --accent-red: #d32f2f;
      --accent-gold: #b8860b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      overflow: hidden; user-select: none;
      display: flex; flex-direction: column; height: 100vh;
    }

    /* --- Title bar (frameless) --- */
    .titlebar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-secondary); padding: 4px 8px; -webkit-app-region: drag;
      font-size: 12px; color: var(--text-dim); min-height: 28px;
    }
    .titlebar-btns { -webkit-app-region: no-drag; display: flex; gap: 4px; }
    .titlebar-btns button {
      background: none; border: none; color: var(--text-dim); font-size: 14px;
      cursor: pointer; padding: 2px 6px; border-radius: 3px;
    }
    .titlebar-btns button:hover { background: var(--bg-btn); color: #fff; }
    .titlebar-btns .close-btn:hover { background: #e94560; color: #fff; }

    /* --- Frequency display --- */
    .freq-row {
      display: flex; align-items: baseline; justify-content: center;
      padding: 12px 16px 4px; gap: 6px;
    }
    .freq-display {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 36px; font-weight: bold; color: var(--accent-blue);
      letter-spacing: 1px; cursor: pointer;
    }
    .freq-display.editing { color: #f0a500; }
    .freq-unit { font-size: 14px; color: var(--text-dimmer); }
    .mode-badge {
      font-size: 14px; font-weight: bold; padding: 2px 10px;
      border-radius: 10px; background: var(--bg-btn); color: var(--accent-green);
      cursor: pointer;
    }
    .filter-badge {
      font-size: 11px; color: var(--text-dim); cursor: pointer;
    }
    .audio-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      font-size: 16px; padding: 2px 6px; border-radius: 4px; cursor: pointer;
      line-height: 1;
    }
    .audio-btn:hover { color: var(--text-primary); border-color: var(--accent-blue); }
    .audio-btn.active { color: var(--accent-green); border-color: var(--accent-green); }
    .audio-btn.muted { color: var(--accent-red); border-color: var(--accent-red); }

    /* --- Tabs --- */
    .tabs {
      display: flex; gap: 0; padding: 0 8px; border-bottom: 1px solid #2a2a4a;
    }
    .tab-btn {
      background: none; border: none; color: var(--text-dimmer); font-size: 12px;
      padding: 6px 14px; cursor: pointer; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
    .tab-btn:hover { color: var(--text-secondary); }

    /* --- Tab content --- */
    .tab-content { flex: 1; overflow-y: auto; padding: 8px; }
    .tab-pane { display: none; height: 100%; }
    .tab-pane.active { display: flex; flex-direction: column; }

    /* --- VFO Dial tab --- */
    .dial-wrap { display: flex; justify-content: center; padding: 8px 0; }
    .step-row { display: flex; justify-content: center; gap: 4px; padding: 4px 0; flex-wrap: wrap; }
    .step-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--text-secondary);
      padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
    }
    .step-btn.active { background: #4fc3f7; color: #1a1a2e; border-color: var(--accent-blue); }
    .op-info {
      font-size: 13px; color: var(--text-secondary); text-align: center; line-height: 1.5;
      padding: 0 2px; max-width: 100%; margin-bottom: 6px;
    }
    .op-info:empty { margin-bottom: 0; }
    .op-call { color: var(--accent-blue); font-weight: bold; font-size: 20px; font-family: 'Consolas', monospace; }
    .op-detail { color: var(--text-secondary); font-size: 13px; }
    .op-ref { color: var(--accent-green); font-weight: bold; font-size: 14px; }
    .solar-pills {
      display: flex; flex-direction: row; gap: 3px;
    }
    .solar-pill {
      display: flex; align-items: center; gap: 2px;
      background: var(--bg-input); border: 1px solid #2a2a4a; border-radius: 3px;
      padding: 1px 5px;
    }
    .solar-label {
      font-size: 8px; color: var(--text-dimmer); font-weight: bold; letter-spacing: 0.5px;
    }
    .solar-val {
      font-size: 11px; font-family: monospace; font-weight: bold; color: var(--accent-green);
    }
    .solar-val.warn { color: var(--accent-gold); }
    .solar-val.bad { color: #e94560; }
    .rig-toggles-shared { justify-content: flex-start; }
    .toggle-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--text-secondary);
      padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
      font-weight: bold;
    }
    .toggle-btn:hover { background: var(--bg-btn-hover); }
    .toggle-btn.on { background: #4ecca3; color: #1a1a2e; border-color: var(--accent-green); }
    .cat-cmd-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--text-secondary);
      padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
    }
    .cat-cmd-btn:hover { background: var(--bg-btn-hover); }
    .cat-cmd-btn:active { background: #4a4a6a; }

    /* --- Keypad tab --- */
    .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-width: 300px; margin: 0 auto; padding: 8px 0; }
    .kp-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--text-primary);
      font-size: 20px; padding: 14px 0; border-radius: 6px; cursor: pointer;
      text-align: center;
    }
    .kp-btn:hover { background: var(--bg-btn-hover); }
    .kp-btn:active { background: #4a4a6a; }
    .kp-btn.kp-action { font-size: 14px; font-weight: bold; }
    .kp-btn.kp-go { background: #4ecca3; color: #1a1a2e; border-color: var(--accent-green); }
    .kp-btn.kp-clear { background: #e94560; color: #fff; border-color: #e94560; }
    .kp-input {
      grid-column: 1 / -1; text-align: center; font-family: 'Consolas', monospace;
      font-size: 24px; background: var(--bg-input); border: 1px solid var(--border);
      color: #f0a500; padding: 8px; border-radius: 4px;
    }
    .kp-digits {
      grid-column: 1 / -1;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    }

    /* --- Mode tab --- */
    .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 4px 0; }
    .mode-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 4px; border-radius: 6px; font-size: 13px; cursor: pointer;
      text-align: center; font-weight: bold;
    }
    .mode-btn:hover { background: var(--bg-btn-hover); }
    .mode-btn.active { background: #4ecca3; color: #1a1a2e; border-color: var(--accent-green); }

    .section-label { font-size: 11px; color: var(--text-dimmer); padding: 8px 0 4px; text-transform: uppercase; letter-spacing: 1px; }

    /* --- Band buttons --- */
    .band-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 4px 0; }
    .band-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--text-secondary);
      padding: 6px 2px; border-radius: 4px; font-size: 12px; cursor: pointer;
      text-align: center;
    }
    .band-btn:hover { background: var(--bg-btn-hover); }
    .band-btn.active { background: #4fc3f7; color: #1a1a2e; border-color: var(--accent-blue); }

    /* --- Filter width --- */
    .filter-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .filter-row label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
    .filter-row input[type="range"] { flex: 1; accent-color: var(--accent-blue); }
    .filter-row .filter-val { font-size: 12px; color: var(--accent-blue); min-width: 50px; text-align: right; font-family: monospace; }

    /* --- Profiles tab --- */
    .profile-list { display: flex; flex-direction: column; gap: 4px; padding: 4px 0; flex: 1; overflow-y: auto; }
    .profile-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: var(--bg-btn); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
    }
    .profile-item:hover { background: var(--bg-btn-hover); }
    .profile-name { font-weight: bold; color: var(--text-primary); flex: 1; }
    .profile-detail { font-size: 11px; color: var(--text-dim); font-family: monospace; }
    .profile-del {
      background: none; border: none; color: var(--text-dimmer); font-size: 16px;
      cursor: pointer; padding: 0 4px;
    }
    .profile-del:hover { color: #e94560; }
    .profile-add-row {
      display: flex; gap: 6px; padding: 8px 0;
    }
    .profile-add-row input {
      flex: 1; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary);
      padding: 6px 8px; border-radius: 4px; font-size: 13px;
    }
    .profile-add-row button {
      background: #4ecca3; color: #1a1a2e; border: none; padding: 6px 14px;
      border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer;
    }
    .profile-add-row button:hover { background: #3ba882; }
    .profile-empty { text-align: center; color: var(--text-dimmer); padding: 20px; font-size: 13px; }
    .settings-toggle {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: var(--text-primary); padding: 8px 4px; cursor: pointer;
    }
    .settings-toggle input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--accent-blue); cursor: pointer;
    }
    .band-checkboxes {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px 8px;
    }
    .band-checkboxes label {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-secondary); padding: 3px 0; cursor: pointer;
    }
    .band-checkboxes input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--accent-blue); cursor: pointer;
    }

    /* --- Widgets (S-meter, PTT, CW macros) --- */
    .widget-area { padding: 0 8px; }
    .widget-section { display: none; }
    .widget-section.visible { display: block; }
    .meter-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .meter-label { font-size: 10px; color: var(--text-dim); width: 26px; text-align: right; }
    .meter-bar-wrap {
      flex: 1; height: 10px; background: var(--bg-input); border-radius: 3px; overflow: hidden;
      border: 1px solid #2a2a4a;
    }
    .meter-bar { height: 100%; width: 0%; transition: width 0.1s; border-radius: 2px; }
    .meter-text { font-size: 11px; font-family: monospace; min-width: 42px; text-align: right; }
    .ptt-log-row { display: flex; gap: 6px; padding: 4px 0; }
    .ptt-btn {
      flex: 3; padding: 10px;
      font-size: 16px; font-weight: bold; border: 2px solid var(--accent-red);
      background: var(--bg-btn); color: var(--accent-red); border-radius: 6px; cursor: pointer;
      text-align: center; user-select: none;
    }
    .ptt-btn:hover { background: var(--bg-btn-hover); }
    .ptt-btn.active { background: var(--accent-red); color: #fff; }
    .log-btn-vfo {
      flex: 1; padding: 10px;
      font-size: 14px; font-weight: bold; border: 2px solid var(--accent-green);
      background: var(--bg-btn); color: var(--accent-green); border-radius: 6px; cursor: pointer;
      text-align: center; user-select: none;
    }
    .log-btn-vfo:hover { background: var(--bg-btn-hover); }
    .macro-row { display: flex; align-items: center; gap: 4px; padding: 4px 0; flex-wrap: wrap; }
    .macro-label {
      font-size: 10px; font-weight: bold; color: var(--text-dimmer); text-transform: uppercase;
      width: 36px; min-width: 36px; text-align: right; letter-spacing: 1px;
    }
    .cw-macro-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 0; }
    .cw-macro-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--accent-gold);
      padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      font-weight: bold;
    }
    .cw-macro-btn:hover { background: var(--bg-btn-hover); }
    .voice-macro-btn {
      background: var(--bg-btn); border: 1px solid var(--border); color: var(--accent-blue);
      padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      font-weight: bold;
    }
    .voice-macro-btn:hover { background: var(--bg-btn-hover); }
    .voice-macro-btn.active { background: #4fc3f7; color: #1a1a2e; }
    .voice-macro-btn.empty { opacity: 0.3; cursor: default; }
    .voice-stop-btn {
      background: #e94560; border: 1px solid #e94560; color: #fff;
      padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      font-weight: bold;
    }
    .cw-cancel-btn {
      background: #e94560; border: 1px solid #e94560; color: #fff;
      padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- Titlebar -->
  <div class="titlebar">
    <span>VFO</span>
    <div class="titlebar-btns">
      <button onclick="window.api.minimize()">&#x2013;</button>
      <button onclick="window.api.maximize()">&#x25A1;</button>
      <button class="close-btn" onclick="window.api.close()">&#x2715;</button>
    </div>
  </div>

  <!-- Frequency + mode display -->
  <div class="freq-row">
    <span class="freq-display" id="freq-display" title="Click to type frequency">---.---.---</span>
    <span class="freq-unit">kHz</span>
    <span class="mode-badge" id="mode-badge" title="Click to change mode">---</span>
    <button class="audio-btn" id="audio-btn" title="Radio audio monitor">&#x1F508;</button>
  </div>
  <div style="display:flex; align-items:center; justify-content:center; gap:10px; padding:0 0 2px;">
    <span class="filter-badge" id="filter-badge"></span>
  </div>
  <!-- Widgets (always visible when enabled) -->
  <div class="widget-area">
    <div class="widget-section" id="widget-smeter">
      <div class="meter-row">
        <span class="meter-label">S</span>
        <div class="meter-bar-wrap"><div class="meter-bar" id="smeter-bar"></div></div>
        <span class="meter-text" id="smeter-text">---</span>
      </div>
      <div class="meter-row">
        <span class="meter-label">SWR</span>
        <div class="meter-bar-wrap"><div class="meter-bar" id="swr-bar"></div></div>
        <span class="meter-text" id="swr-text">&mdash;</span>
      </div>
    </div>
    <div class="widget-section" id="widget-ptt">
      <div class="ptt-log-row">
        <button class="ptt-btn" id="ptt-btn">PTT</button>
        <button class="log-btn-vfo" id="log-btn-vfo">LOG</button>
      </div>
    </div>
    <div class="widget-section" id="widget-cw">
      <div class="macro-row"><span class="macro-label">CW</span><div class="cw-macro-row" id="cw-macro-row" style="display:contents"></div></div>
    </div>
    <div class="widget-section" id="widget-voice">
      <div class="macro-row"><span class="macro-label">Voice</span><div class="cw-macro-row" id="voice-macro-row" style="display:contents"></div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="dial">Dial</button>
    <button class="tab-btn" data-tab="keypad">Keypad</button>
    <button class="tab-btn" data-tab="profiles">Profiles</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>

  <!-- Tab content -->
  <div class="tab-content">
    <!-- Dial tab -->
    <div class="tab-pane active" id="tab-dial">
      <div style="display:flex;align-items:stretch;justify-content:center;gap:8px;">
        <div class="dial-wrap">
          <canvas id="vfo-dial" width="200" height="200"></canvas>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:space-between;min-width:90px;">
          <div class="op-info" id="op-info" style="padding-top:4px;"></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding-bottom:2px;">
            <div class="vfo-section solar-pills" id="sec-solar">
              <div class="solar-pill" title="Solar Flux Index"><span class="solar-label">SFI</span><span class="solar-val" id="sv-sfi">--</span></div>
              <div class="solar-pill" title="K-Index"><span class="solar-label">K</span><span class="solar-val" id="sv-k">--</span></div>
              <div class="solar-pill" title="A-Index"><span class="solar-label">A</span><span class="solar-val" id="sv-a">--</span></div>
            </div>
            <div class="vfo-section" id="sec-step">
              <select id="step-select" style="background:var(--bg-btn);border:1px solid var(--border);color:var(--accent-blue);padding:4px 6px;border-radius:4px;font-size:11px;cursor:pointer;"></select>
            </div>
          </div>
        </div>
      </div>
      <div class="vfo-section" id="sec-band">
        <div class="section-label">Quick Band</div>
        <div class="band-grid" id="band-grid-dial"></div>
      </div>
      <div class="vfo-section" id="sec-filter">
        <div class="section-label">Filter</div>
        <div class="step-row filter-quick-shared"></div>
      </div>
      <div class="vfo-section" id="sec-filter-slider">
        <div class="filter-row">
          <label>BW</label>
          <input type="range" id="filter-slider" min="50" max="4000" step="50" value="2400">
          <span class="filter-val" id="filter-val">2400 Hz</span>
        </div>
      </div>
      <div class="vfo-section" id="sec-controls">
        <div class="section-label">Controls</div>
        <div class="step-row rig-toggles-shared"></div>
      </div>
      <div class="vfo-section" id="sec-profiles-inline" style="display:none">
        <div class="section-label">Profiles</div>
        <div class="profile-list" id="profile-list-inline"></div>
      </div>
    </div>

    <!-- Keypad tab -->
    <div class="tab-pane" id="tab-keypad">
      <div class="keypad">
        <input type="text" class="kp-input" id="kp-input" placeholder="MHz" readonly>
        <div class="kp-digits">
          <button class="kp-btn" data-digit="1">1</button>
          <button class="kp-btn" data-digit="2">2</button>
          <button class="kp-btn" data-digit="3">3</button>
          <button class="kp-btn" data-digit="4">4</button>
          <button class="kp-btn" data-digit="5">5</button>
          <button class="kp-btn" data-digit="6">6</button>
          <button class="kp-btn" data-digit="7">7</button>
          <button class="kp-btn" data-digit="8">8</button>
          <button class="kp-btn" data-digit="9">9</button>
        </div>
        <button class="kp-btn kp-action kp-clear" id="kp-clear">CLR</button>
        <button class="kp-btn" data-digit="0">0</button>
        <button class="kp-btn" id="kp-dot">.</button>
        <button class="kp-btn kp-action kp-go" id="kp-go">GO</button>
      </div>
      <div style="text-align:center; padding:6px; font-size:11px; color:#666;">
        Enter frequency in MHz (e.g. 14.025)
      </div>
      <div class="vfo-section" id="sec-filter-kp">
        <div class="section-label">Filter</div>
        <div class="step-row filter-quick-shared"></div>
      </div>
      <div class="vfo-section" id="sec-controls-kp">
        <div class="section-label">Controls</div>
        <div class="step-row rig-toggles-shared"></div>
      </div>
    </div>

    <!-- Profiles tab -->
    <div class="tab-pane" id="tab-profiles">
      <div class="profile-add-row">
        <input type="text" id="profile-name-input" placeholder="Profile name (e.g. 20m CW)">
        <button id="profile-save-btn">Save Current</button>
      </div>
      <div class="profile-list" id="profile-list">
        <div class="profile-empty">No profiles yet. Tune to a frequency and save it above.</div>
      </div>
    </div>

    <!-- Settings tab -->
    <div class="tab-pane" id="tab-settings">
      <div class="section-label">Widgets</div>
      <label class="settings-toggle"><input type="checkbox" id="w-smeter"> S-meter / SWR</label>
      <label class="settings-toggle"><input type="checkbox" id="w-ptt"> PTT / LOG Buttons</label>
      <label class="settings-toggle" style="padding-left:28px;"><input type="checkbox" id="w-ptt-mic"> Route mic to radio during PTT</label>
      <div id="mic-select-row" style="padding-left:28px;padding-bottom:4px;display:none;">
        <select id="mic-select" style="width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);padding:4px 6px;border-radius:4px;font-size:12px;"></select>
      </div>
      <label class="settings-toggle"><input type="checkbox" id="w-cw"> CW Macros</label>
      <label class="settings-toggle"><input type="checkbox" id="w-voice"> Voice Macros</label>
      <div class="section-label">Dial Sections</div>
      <label class="settings-toggle"><input type="checkbox" id="s-solar" checked> Solar (SFI/K/A)</label>
      <label class="settings-toggle"><input type="checkbox" id="s-step" checked> Step Size</label>
      <label class="settings-toggle"><input type="checkbox" id="s-band" checked> Quick Band</label>
      <label class="settings-toggle"><input type="checkbox" id="s-filter" checked> Filter Buttons</label>
      <label class="settings-toggle"><input type="checkbox" id="s-filter-slider" checked> Filter Slider</label>
      <label class="settings-toggle"><input type="checkbox" id="s-controls" checked> Controls</label>
      <label class="settings-toggle"><input type="checkbox" id="s-profiles-inline"> Profiles (inline)</label>
      <div class="section-label">Quick Bands</div>
      <div class="band-checkboxes" id="band-checkboxes"></div>
    </div>
  </div>

<script>
// --- State ---
let currentFreqHz = 0;
let currentMode = '';
let _modeSuppressUntil = 0; // suppress stale mode from CAT poll after user click
let currentFilterWidth = 0;
let profiles = [];
let vfoHiddenBands = []; // band labels to hide, e.g. ['160m', '2m', '70cm']

const freqDisplay = document.getElementById('freq-display');
const modeBadge = document.getElementById('mode-badge');
const filterBadge = document.getElementById('filter-badge');
const filterSlider = document.getElementById('filter-slider');
const filterVal = document.getElementById('filter-val');

// --- Tabs ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// --- Frequency display ---
function formatFreqKhz(hz) {
  if (!hz) return '---.---.---';
  const khz = hz / 1000;
  const mhz = Math.floor(khz / 1000);
  const remainder = khz - mhz * 1000;
  const whole = Math.floor(remainder);
  const frac = Math.round((remainder - whole) * 100);
  return `${mhz}.${String(whole).padStart(3, '0')}.${String(frac).padStart(2, '0')}`;
}

function updateDisplay() {
  freqDisplay.textContent = formatFreqKhz(currentFreqHz);
  const m = (currentMode || '').toUpperCase();
  modeBadge.textContent = m.startsWith('FREEDV') ? 'RADE' : (currentMode || '---');
  if (currentFilterWidth > 0) {
    filterBadge.textContent = currentFilterWidth >= 1000
      ? (currentFilterWidth / 1000).toFixed(1) + ' kHz'
      : currentFilterWidth + ' Hz';
  } else {
    filterBadge.textContent = '';
  }
  updateBandHighlight();
}

// --- Radio state from main process ---
window.api.onRadioState((s) => {
  if (s.freq) currentFreqHz = s.freq;
  if (s.mode && Date.now() > _modeSuppressUntil) currentMode = s.mode;
  if (s.filterWidth != null) {
    currentFilterWidth = s.filterWidth;
    filterSlider.value = s.filterWidth || 2400;
    const hz = s.filterWidth || 2400;
    filterVal.textContent = hz >= 1000 ? (hz / 1000).toFixed(1) + ' kHz' : hz + ' Hz';
    updateFilterQuickHighlight();
  }
  if (s.nb != null) {
    nbOn = s.nb;
    document.querySelectorAll('.nb-toggle').forEach(b => b.classList.toggle('on', nbOn));
  }
  if (s.atu != null) {
    atuOn = s.atu;
    document.querySelectorAll('.atu-toggle').forEach(b => b.classList.toggle('on', atuOn));
  }
  if (s.customCatButtons) {
    customCatButtons = s.customCatButtons;
    buildCustomCatBtns();
  }
  updateDisplay();
  updateModeHighlight();
});

// --- Bands ---
const BANDS = [
  { label: '160m', freq: 1800 },
  { label: '80m', freq: 3500 },
  { label: '60m', freq: 5332 },
  { label: '40m', freq: 7000 },
  { label: '30m', freq: 10100 },
  { label: '20m', freq: 14000 },
  { label: '17m', freq: 18068 },
  { label: '15m', freq: 21000 },
  { label: '12m', freq: 24890 },
  { label: '10m', freq: 28000 },
  { label: '6m', freq: 50000 },
  { label: '2m', freq: 144000 },
  { label: '70cm', freq: 420000 },
];

function freqToBand(hz) {
  const khz = hz / 1000;
  for (const b of BANDS) {
    if (b.label === '160m' && khz >= 1800 && khz <= 2000) return b.label;
    if (b.label === '80m' && khz >= 3500 && khz <= 4000) return b.label;
    if (b.label === '60m' && khz >= 5300 && khz <= 5500) return b.label;
    if (b.label === '40m' && khz >= 7000 && khz <= 7300) return b.label;
    if (b.label === '30m' && khz >= 10100 && khz <= 10150) return b.label;
    if (b.label === '20m' && khz >= 14000 && khz <= 14350) return b.label;
    if (b.label === '17m' && khz >= 18068 && khz <= 18168) return b.label;
    if (b.label === '15m' && khz >= 21000 && khz <= 21450) return b.label;
    if (b.label === '12m' && khz >= 24890 && khz <= 24990) return b.label;
    if (b.label === '10m' && khz >= 28000 && khz <= 29700) return b.label;
    if (b.label === '6m' && khz >= 50000 && khz <= 54000) return b.label;
    if (b.label === '2m' && khz >= 144000 && khz <= 148000) return b.label;
    if (b.label === '70cm' && khz >= 420000 && khz <= 450000) return b.label;
  }
  return null;
}

function buildBandGrid(container) {
  container.innerHTML = '';
  for (const b of BANDS) {
    if (vfoHiddenBands.includes(b.label)) continue;
    const btn = document.createElement('button');
    btn.className = 'band-btn';
    btn.textContent = b.label;
    btn.dataset.freq = b.freq;
    btn.addEventListener('click', () => {
      window.api.tune(b.freq);
    });
    container.appendChild(btn);
  }
}

function rebuildAllBandGrids() {
  buildBandGrid(document.getElementById('band-grid-dial'));
  updateBandHighlight();
}

function updateBandHighlight() {
  const cur = freqToBand(currentFreqHz);
  document.querySelectorAll('.band-btn').forEach(btn => {
    const b = BANDS.find(b => b.freq === parseInt(btn.dataset.freq));
    btn.classList.toggle('active', b && b.label === cur);
  });
}

buildBandGrid(document.getElementById('band-grid-dial'));
// band-grid-mode removed (Mode tab eliminated)

// --- Modes ---
const MODES = ['USB', 'LSB', 'CW', 'AM', 'FM', 'FT8', 'FT4', 'RTTY', 'DIGU', 'DIGL', 'RADE'];

function updateModeHighlight() {
  // Updates popup picker if open
  document.querySelectorAll('.mode-btn').forEach(btn => {
    const m = currentMode.toUpperCase();
    const bm = btn.textContent;
    const match = bm === m
      || (bm === 'USB' && m === 'SSB')
      || (bm === 'LSB' && m === 'SSB')
      || (bm === 'RADE' && m.includes('FREEDV'));
    btn.classList.toggle('active', match);
  });
}

// Frequency display click → switch to keypad tab
freqDisplay.addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="keypad"]').classList.add('active');
  document.getElementById('tab-keypad').classList.add('active');
  kpBuffer = '';
  kpInput.value = '';
});

// Mode badge click → show inline picker
modeBadge.addEventListener('click', (e) => {
  e.stopPropagation();
  let picker = document.getElementById('mode-picker-popup');
  if (picker) { picker.remove(); return; }
  picker = document.createElement('div');
  picker.id = 'mode-picker-popup';
  picker.style.cssText = 'position:absolute;left:50%;transform:translateX(-50%);top:70px;z-index:100;background:var(--bg-secondary);border:1px solid #4fc3f7;border-radius:8px;padding:6px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,0.5);';
  MODES.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (currentMode.toUpperCase() === m || (m === 'RADE' && currentMode.toUpperCase().includes('FREEDV')) ? ' active' : '');
    btn.textContent = m;
    btn.style.cssText = 'padding:8px 12px;font-size:13px;min-width:52px;';
    btn.addEventListener('click', () => {
      const catMode = m === 'RADE' ? 'FREEDV-RADEV1' : m;
      window.api.setMode(catMode);
      currentMode = m;
      _modeSuppressUntil = Date.now() + 2000;
      updateModeHighlight();
      updateDisplay();
      picker.remove();
    });
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
  const dismiss = () => { const p = document.getElementById('mode-picker-popup'); if (p) p.remove(); document.removeEventListener('click', dismiss); };
  setTimeout(() => document.addEventListener('click', dismiss), 0);
});

// --- Filter width ---
const FILTER_QUICK = [250, 500, 1000, 1500, 2000, 2400, 3000, 4000];

function buildFilterQuick() {
  document.querySelectorAll('.filter-quick-shared').forEach(row => {
    row.innerHTML = '';
    FILTER_QUICK.forEach(hz => {
      const btn = document.createElement('button');
      btn.className = 'step-btn fq-btn' + (currentFilterWidth === hz ? ' active' : '');
      btn.dataset.hz = hz;
      btn.textContent = hz >= 1000 ? (hz / 1000) + 'k' : hz;
      btn.addEventListener('click', () => {
        currentFilterWidth = hz;
        window.api.setFilterWidth(hz);
        filterSlider.value = hz;
        filterVal.textContent = hz >= 1000 ? (hz / 1000).toFixed(1) + ' kHz' : hz + ' Hz';
        updateFilterQuickHighlight();
        updateDisplay();
      });
      row.appendChild(btn);
    });
  });
}
function updateFilterQuickHighlight() {
  document.querySelectorAll('.fq-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.hz) === currentFilterWidth);
  });
}
buildFilterQuick();

filterSlider.addEventListener('input', () => {
  const hz = parseInt(filterSlider.value);
  filterVal.textContent = hz >= 1000 ? (hz / 1000).toFixed(1) + ' kHz' : hz + ' Hz';
});

filterSlider.addEventListener('change', () => {
  const hz = parseInt(filterSlider.value);
  currentFilterWidth = hz;
  window.api.setFilterWidth(hz);
  updateFilterQuickHighlight();
  updateDisplay();
});

// --- NB / ATU toggles ---
let nbOn = false, atuOn = false;

function buildRigToggles() {
  document.querySelectorAll('.rig-toggles-shared').forEach(row => {
    row.innerHTML = '';
    const nbBtn = document.createElement('button');
    nbBtn.className = 'toggle-btn nb-toggle' + (nbOn ? ' on' : '');
    nbBtn.textContent = 'NB';
    nbBtn.title = 'Noise Blanker';
    nbBtn.addEventListener('click', () => {
      nbOn = !nbOn;
      window.api.rigControl({ action: 'set-nb', on: nbOn });
      document.querySelectorAll('.nb-toggle').forEach(b => b.classList.toggle('on', nbOn));
    });
    row.appendChild(nbBtn);

    const atuBtn = document.createElement('button');
    atuBtn.className = 'toggle-btn atu-toggle' + (atuOn ? ' on' : '');
    atuBtn.textContent = 'ATU';
    atuBtn.title = 'Antenna Tuner';
    atuBtn.addEventListener('click', () => {
      atuOn = !atuOn;
      window.api.rigControl({ action: 'atu-tune', on: atuOn });
      document.querySelectorAll('.atu-toggle').forEach(b => b.classList.toggle('on', atuOn));
    });
    row.appendChild(atuBtn);
  });
}
buildRigToggles();
// Custom CAT buttons injected after rig toggles since they share the same row

// --- Custom CAT buttons ---
let customCatButtons = [];

function buildCustomCatBtns() {
  // Remove any previously injected custom buttons
  document.querySelectorAll('.custom-cat-injected').forEach(el => el.remove());
  const btns = customCatButtons.filter(b => b.name && b.command);
  if (btns.length === 0) return;
  // Append custom CAT buttons into each rig-toggles-shared row
  document.querySelectorAll('.rig-toggles-shared').forEach(row => {
    btns.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'cat-cmd-btn custom-cat-injected';
      btn.textContent = b.name;
      btn.title = b.command;
      btn.addEventListener('click', () => window.api.sendCustomCat(b.command));
      row.appendChild(btn);
    });
  });
}
buildCustomCatBtns();

// --- Step sizes for VFO dial ---
const STEPS = [
  { label: '10 Hz', hz: 10 },
  { label: '50 Hz', hz: 50 },
  { label: '100 Hz', hz: 100 },
  { label: '500 Hz', hz: 500 },
  { label: '1 kHz', hz: 1000 },
  { label: '5 kHz', hz: 5000 },
  { label: '10 kHz', hz: 10000 },
  { label: '25 kHz', hz: 25000 },
];
let stepIdx = 4; // default 1 kHz

const stepSelect = document.getElementById('step-select');
STEPS.forEach((s, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = 'Step: ' + s.label;
  if (i === stepIdx) opt.selected = true;
  stepSelect.appendChild(opt);
});
stepSelect.addEventListener('change', () => { stepIdx = parseInt(stepSelect.value); });

// --- VFO Dial (canvas) ---
const canvas = document.getElementById('vfo-dial');
const ctx = canvas.getContext('2d');
const CX = canvas.width / 2, CY = canvas.height / 2;
const HOUSING_R = 94, KNOB_R = 73;
let vfoAngle = 0, vfoAccum = 0;
const STEP_ANGLE = Math.PI / 6; // 30 deg per step

function drawVfoDial() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Housing
  ctx.beginPath(); ctx.arc(CX, CY + 1, HOUSING_R, 0, Math.PI * 2);
  ctx.fillStyle = '#222233'; ctx.fill();
  const hg = ctx.createLinearGradient(CX - HOUSING_R, CY - HOUSING_R, CX + HOUSING_R, CY + HOUSING_R);
  hg.addColorStop(0, '#404058'); hg.addColorStop(0.5, '#2a2a3a'); hg.addColorStop(1, '#1a1a28');
  ctx.beginPath(); ctx.arc(CX, CY, HOUSING_R, 0, Math.PI * 2);
  ctx.fillStyle = hg; ctx.fill();
  // Bevel
  ctx.beginPath(); ctx.arc(CX, CY, HOUSING_R - 1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5; ctx.stroke();
  // Indicator
  ctx.beginPath(); ctx.moveTo(CX, CY - HOUSING_R + 2); ctx.lineTo(CX, CY - HOUSING_R + 14);
  ctx.strokeStyle = '#4ecca3'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();

  // Knob
  const kg = ctx.createRadialGradient(CX - 10, CY - 10, 10, CX, CY, KNOB_R);
  kg.addColorStop(0, '#4a4a62'); kg.addColorStop(0.7, '#353548'); kg.addColorStop(1, '#28283a');
  ctx.beginPath(); ctx.arc(CX, CY, KNOB_R, 0, Math.PI * 2);
  ctx.fillStyle = kg; ctx.fill();

  // Grip ridges
  const N_RIDGES = 48;
  for (let i = 0; i < N_RIDGES; i++) {
    const a = vfoAngle + (i / N_RIDGES) * Math.PI * 2;
    const r1 = KNOB_R - 2, r2 = KNOB_R - 8;
    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(a) * r1, CY + Math.sin(a) * r1);
    ctx.lineTo(CX + Math.cos(a) * r2, CY + Math.sin(a) * r2);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.stroke();
  }

  // Finger dimple
  const da = vfoAngle - Math.PI / 2;
  const dr = KNOB_R * 0.55;
  const dx = CX + Math.cos(da) * dr, dy = CY + Math.sin(da) * dr;
  const dg = ctx.createRadialGradient(dx - 1, dy - 1, 1, dx, dy, 8);
  dg.addColorStop(0, '#1a1a28'); dg.addColorStop(1, '#2a2a3a');
  ctx.beginPath(); ctx.arc(dx, dy, 8, 0, Math.PI * 2);
  ctx.fillStyle = dg; ctx.fill();
}
drawVfoDial();

// --- Dial interaction ---
let dragging = false, lastAngle = 0, velocity = 0, inertiaId = null;

function getAngle(e) {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - r.left - CX;
  const y = (e.clientY || e.touches[0].clientY) - r.top - CY;
  return Math.atan2(y, x);
}

function processDelta(delta) {
  vfoAngle += delta;
  vfoAccum += delta;
  while (Math.abs(vfoAccum) >= STEP_ANGLE) {
    const dir = vfoAccum > 0 ? 1 : -1;
    vfoAccum -= dir * STEP_ANGLE;
    const stepHz = STEPS[stepIdx].hz * dir;
    currentFreqHz = Math.max(0, currentFreqHz + stepHz);
    window.api.tune(currentFreqHz / 1000);
  }
  updateDisplay();
  drawVfoDial();
}

canvas.addEventListener('mousedown', (e) => {
  dragging = true; lastAngle = getAngle(e); velocity = 0;
  if (inertiaId) { cancelAnimationFrame(inertiaId); inertiaId = null; }
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const a = getAngle(e);
  let delta = a - lastAngle;
  if (delta > Math.PI) delta -= 2 * Math.PI;
  if (delta < -Math.PI) delta += 2 * Math.PI;
  velocity = delta;
  lastAngle = a;
  processDelta(delta);
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  // Inertia
  const decay = () => {
    velocity *= 0.92;
    if (Math.abs(velocity) < 0.001) { inertiaId = null; return; }
    processDelta(velocity);
    inertiaId = requestAnimationFrame(decay);
  };
  if (Math.abs(velocity) > 0.01) inertiaId = requestAnimationFrame(decay);
});

// Mouse wheel
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const dir = e.deltaY > 0 ? 1 : -1;
  const stepHz = STEPS[stepIdx].hz * dir;
  currentFreqHz = Math.max(0, currentFreqHz + stepHz);
  vfoAngle += dir * STEP_ANGLE;
  window.api.tune(currentFreqHz / 1000);
  updateDisplay();
  drawVfoDial();
}, { passive: false });

// --- Keypad ---
const kpInput = document.getElementById('kp-input');
let kpBuffer = '';

document.querySelectorAll('.kp-btn[data-digit]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (kpBuffer.length >= 10) return;
    kpBuffer += btn.dataset.digit;
    kpInput.value = kpBuffer;
  });
});

document.getElementById('kp-dot').addEventListener('click', () => {
  if (!kpBuffer.includes('.')) { kpBuffer += '.'; kpInput.value = kpBuffer; }
});

document.getElementById('kp-clear').addEventListener('click', () => {
  kpBuffer = '';
  kpInput.value = '';
});

document.getElementById('kp-go').addEventListener('click', () => {
  const val = parseFloat(kpBuffer);
  if (isNaN(val) || val <= 0) return;
  // If the input has a decimal point, treat as MHz (user was explicit)
  // Otherwise: > 300 = kHz, > 300000 = Hz, else MHz
  let mhz;
  if (kpBuffer.includes('.')) {
    mhz = val;
  } else if (val > 300000) {
    mhz = val / 1000000;
  } else if (val > 300) {
    mhz = val / 1000;
  } else {
    mhz = val;
  }
  const khz = mhz * 1000;
  window.api.tune(khz);
  currentFreqHz = khz * 1000;
  kpBuffer = '';
  kpInput.value = '';
  updateDisplay();
});

// Keyboard support for keypad
document.addEventListener('keydown', (e) => {
  if (e.key >= '0' && e.key <= '9') {
    const btn = document.querySelector(`.kp-btn[data-digit="${e.key}"]`);
    if (btn) btn.click();
  } else if (e.key === '.' || e.key === ',') {
    if (!kpBuffer.includes('.')) { kpBuffer += '.'; kpInput.value = kpBuffer; }
  } else if (e.key === 'Backspace') {
    kpBuffer = kpBuffer.slice(0, -1);
    kpInput.value = kpBuffer;
  } else if (e.key === 'Enter') {
    document.getElementById('kp-go').click();
  } else if (e.key === 'Escape') {
    document.getElementById('kp-clear').click();
  }
});

// --- Profiles ---
async function loadProfiles() {
  const s = await window.api.getSettings();
  profiles = s.vfoProfiles || [];
  renderProfiles();
}

function renderProfiles() {
  const list = document.getElementById('profile-list');
  if (profiles.length === 0) {
    list.innerHTML = '<div class="profile-empty">No profiles yet. Tune to a frequency and save it above.</div>';
    return;
  }
  list.innerHTML = '';
  profiles.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'profile-item';
    const freqMhz = p.freqKhz ? (p.freqKhz / 1000).toFixed(3) : '?';
    item.innerHTML = `
      <span class="profile-name">${esc(p.name)}</span>
      <span class="profile-detail">${freqMhz} MHz ${p.mode || ''}${p.filterWidth ? ' BW:' + p.filterWidth : ''}</span>
      <button class="profile-del" title="Delete profile">&times;</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.profile-del')) return;
      applyProfile(p);
    });
    item.querySelector('.profile-del').addEventListener('click', (e) => {
      e.stopPropagation();
      profiles.splice(i, 1);
      saveProfiles();
      renderProfiles();
    });
    list.appendChild(item);
  });
}

function renderInlineProfiles() {
  const list = document.getElementById('profile-list-inline');
  if (!list) return;
  if (profiles.length === 0) {
    list.innerHTML = '<div class="profile-empty">No profiles saved.</div>';
    return;
  }
  list.innerHTML = '';
  profiles.forEach(p => {
    const item = document.createElement('div');
    item.className = 'profile-item';
    const freqMhz = p.freqKhz ? (p.freqKhz / 1000).toFixed(3) : '?';
    item.innerHTML = `
      <span class="profile-name">${esc(p.name)}</span>
      <span class="profile-detail">${freqMhz} MHz ${p.mode || ''}${p.filterWidth ? ' BW:' + p.filterWidth : ''}</span>
    `;
    item.addEventListener('click', () => applyProfile(p));
    list.appendChild(item);
  });
}

function applyProfile(p) {
  if (p.freqKhz) {
    window.api.tune(p.freqKhz, p.mode);
    currentFreqHz = p.freqKhz * 1000;
  }
  if (p.mode) {
    currentMode = p.mode;
    _modeSuppressUntil = Date.now() + 2000;
  }
  if (p.filterWidth) {
    currentFilterWidth = p.filterWidth;
    window.api.setFilterWidth(p.filterWidth);
    filterSlider.value = p.filterWidth;
    filterVal.textContent = p.filterWidth >= 1000
      ? (p.filterWidth / 1000).toFixed(1) + ' kHz'
      : p.filterWidth + ' Hz';
  }
  updateDisplay();
  updateModeHighlight();
}

async function saveProfiles() {
  await window.api.saveSettings({ vfoProfiles: profiles });
  renderInlineProfiles();
}

document.getElementById('profile-save-btn').addEventListener('click', async () => {
  const name = document.getElementById('profile-name-input').value.trim();
  if (!name) { document.getElementById('profile-name-input').focus(); return; }
  profiles.push({
    name,
    freqKhz: currentFreqHz / 1000,
    mode: currentMode,
    filterWidth: currentFilterWidth,
  });
  await saveProfiles();
  renderProfiles();
  document.getElementById('profile-name-input').value = '';
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// --- Widget visibility ---
const WIDGETS = ['smeter', 'ptt', 'cw', 'voice'];
let vfoWidgets = { smeter: false, ptt: false, cw: false, voice: false };
const SECTIONS = ['solar', 'step', 'band', 'filter', 'filter-slider', 'controls', 'profiles-inline'];
let vfoSections = { solar: true, step: true, band: true, filter: true, 'filter-slider': true, controls: true, 'profiles-inline': false };

async function loadWidgets() {
  const s = await window.api.getSettings();
  if (s.vfoWidgets) vfoWidgets = { ...vfoWidgets, ...s.vfoWidgets };
  if (s.vfoSections) vfoSections = { ...vfoSections, ...s.vfoSections };
  if (s.vfoHiddenBands) vfoHiddenBands = s.vfoHiddenBands;
  if (s.vfoPttMic != null) pttMicEnabled = s.vfoPttMic;
  if (s.vfoPttMicDevice) pttMicDeviceId = s.vfoPttMicDevice;
  applyWidgets();
  applySections();
  rebuildAllBandGrids();
  buildBandCheckboxes();
  syncSettingsCheckboxes();
}

function applyWidgets() {
  WIDGETS.forEach(w => {
    const el = document.getElementById('widget-' + w);
    if (el) el.classList.toggle('visible', !!vfoWidgets[w]);
  });
}

function applySections() {
  SECTIONS.forEach(s => {
    // Apply to both Dial and Keypad tab instances
    document.querySelectorAll('#sec-' + s + ', #sec-' + s + '-kp').forEach(el => {
      el.style.display = vfoSections[s] ? '' : 'none';
    });
  });
  // Render inline profiles if visible
  if (vfoSections['profiles-inline']) renderInlineProfiles();
}

async function saveWidgets() {
  await window.api.saveSettings({ vfoWidgets, vfoSections, vfoHiddenBands });
}

// Settings tab widget toggles
const wSmeter = document.getElementById('w-smeter');
const wPtt = document.getElementById('w-ptt');
const wPttMic = document.getElementById('w-ptt-mic');
const wCw = document.getElementById('w-cw');
const wVoice = document.getElementById('w-voice');
const sSolar = document.getElementById('s-solar');
const sStep = document.getElementById('s-step');
const sBand = document.getElementById('s-band');
const sFilter = document.getElementById('s-filter');
const sFilterSlider = document.getElementById('s-filter-slider');
const sControls = document.getElementById('s-controls');
const sProfilesInline = document.getElementById('s-profiles-inline');

function syncSettingsCheckboxes() {
  wSmeter.checked = !!vfoWidgets.smeter;
  wPtt.checked = !!vfoWidgets.ptt;
  wPttMic.checked = pttMicEnabled;
  micSelectRow.style.display = pttMicEnabled ? '' : 'none';
  if (pttMicEnabled) populateMicDevices();
  wCw.checked = !!vfoWidgets.cw;
  wVoice.checked = !!vfoWidgets.voice;
  sSolar.checked = !!vfoSections.solar;
  sStep.checked = !!vfoSections.step;
  sBand.checked = !!vfoSections.band;
  sFilter.checked = !!vfoSections.filter;
  sFilterSlider.checked = !!vfoSections['filter-slider'];
  sControls.checked = !!vfoSections.controls;
  sProfilesInline.checked = !!vfoSections['profiles-inline'];
}

[wSmeter, wPtt, wCw, wVoice].forEach(cb => {
  cb.addEventListener('change', () => {
    vfoWidgets.smeter = wSmeter.checked;
    vfoWidgets.ptt = wPtt.checked;
    vfoWidgets.cw = wCw.checked;
    vfoWidgets.voice = wVoice.checked;
    applyWidgets();
    saveWidgets();
  });
});

const micSelectRow = document.getElementById('mic-select-row');
const micSelect = document.getElementById('mic-select');
let pttMicDeviceId = ''; // '' = system default

wPttMic.addEventListener('change', () => {
  pttMicEnabled = wPttMic.checked;
  micSelectRow.style.display = pttMicEnabled ? '' : 'none';
  if (pttMicEnabled) populateMicDevices();
  window.api.saveSettings({ vfoPttMic: pttMicEnabled });
});

micSelect.addEventListener('change', () => {
  pttMicDeviceId = micSelect.value;
  window.api.saveSettings({ vfoPttMicDevice: pttMicDeviceId });
});

async function populateMicDevices() {
  try {
    // Trigger permission prompt if needed
    const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
    tmp.getTracks().forEach(t => t.stop());
    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs = devices.filter(d => d.kind === 'audioinput');
    micSelect.innerHTML = '<option value="">System Default</option>' +
      inputs.map(d => '<option value="' + d.deviceId + '">' + (d.label || d.deviceId.slice(0, 20)) + '</option>').join('');
    if (pttMicDeviceId) micSelect.value = pttMicDeviceId;
  } catch (e) {
    console.error('[VFO] Cannot enumerate mic devices:', e.message);
  }
}

[sSolar, sStep, sBand, sFilter, sFilterSlider, sControls, sProfilesInline].forEach(cb => {
  cb.addEventListener('change', () => {
    vfoSections.solar = sSolar.checked;
    vfoSections.step = sStep.checked;
    vfoSections.band = sBand.checked;
    vfoSections.filter = sFilter.checked;
    vfoSections['filter-slider'] = sFilterSlider.checked;
    vfoSections.controls = sControls.checked;
    vfoSections['profiles-inline'] = sProfilesInline.checked;
    applySections();
    saveWidgets();
  });
});

// --- Band checkboxes in Settings ---
function buildBandCheckboxes() {
  const container = document.getElementById('band-checkboxes');
  container.innerHTML = '';
  BANDS.forEach(b => {
    const lbl = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !vfoHiddenBands.includes(b.label);
    cb.addEventListener('change', () => {
      if (cb.checked) {
        vfoHiddenBands = vfoHiddenBands.filter(x => x !== b.label);
      } else {
        if (!vfoHiddenBands.includes(b.label)) vfoHiddenBands.push(b.label);
      }
      rebuildAllBandGrids();
      saveWidgets();
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(b.label));
    container.appendChild(lbl);
  });
}

// --- S-meter ---
const smeterBar = document.getElementById('smeter-bar');
const smeterText = document.getElementById('smeter-text');
const swrBar = document.getElementById('swr-bar');
const swrText = document.getElementById('swr-text');

window.api.onSmeter((val) => {
  const pct = Math.min(100, (val / 255) * 100);
  const color = val < 80 ? '#4ecca3' : val < 160 ? '#ffd740' : '#e94560';
  smeterBar.style.width = pct + '%';
  smeterBar.style.background = color;
  if (val <= 120) {
    smeterText.textContent = 'S' + Math.round(val * 9 / 120);
  } else {
    smeterText.textContent = 'S9+' + Math.round((val - 120) * 60 / 135);
  }
  smeterText.style.color = color;
});

window.api.onSwr((val) => {
  if (val <= 0) {
    swrBar.style.width = '0%';
    swrText.textContent = '\u2014';
    swrText.style.color = '#666';
    return;
  }
  const swr = 1.0 + (val / 60);
  const pct = Math.min(100, ((swr - 1) / 4) * 100);
  const color = swr <= 1.5 ? '#4ecca3' : swr <= 2.0 ? '#ffd740' : swr <= 3.0 ? '#f0a500' : '#e94560';
  swrBar.style.width = pct + '%';
  swrBar.style.background = color;
  swrText.textContent = swr < 10 ? swr.toFixed(1) : '>10';
  swrText.style.color = color;
});

window.api.onSwrRatio((swr) => {
  const pct = Math.min(100, ((swr - 1) / 4) * 100);
  const color = swr <= 1.5 ? '#4ecca3' : swr <= 2.0 ? '#ffd740' : swr <= 3.0 ? '#f0a500' : '#e94560';
  swrBar.style.width = pct + '%';
  swrBar.style.background = color;
  swrText.textContent = swr < 10 ? swr.toFixed(1) : '>10';
  swrText.style.color = color;
});

// --- PTT ---
const pttBtn = document.getElementById('ptt-btn');
let pttDown = false;
let pttMicEnabled = false; // route mic to radio TX during PTT
let pttMicCtx = null;
let pttMicStream = null;

async function pttStart() {
  if (pttDown) return;
  pttDown = true;
  pttBtn.classList.add('active');
  pttBtn.textContent = 'TX';
  // Start mic → radio TX if enabled
  if (pttMicEnabled) {
    try {
      const s = await window.api.getSettings();
      const micConstraints = { echoCancellation: false, noiseSuppression: false, autoGainControl: false };
      if (pttMicDeviceId) micConstraints.deviceId = { exact: pttMicDeviceId };
      pttMicStream = await navigator.mediaDevices.getUserMedia({ audio: micConstraints });
      pttMicCtx = new AudioContext();
      if (pttMicCtx.state === 'suspended') await pttMicCtx.resume();
      if (s.remoteAudioOutput && pttMicCtx.setSinkId) {
        await pttMicCtx.setSinkId(s.remoteAudioOutput);
      }
      const source = pttMicCtx.createMediaStreamSource(pttMicStream);
      source.connect(pttMicCtx.destination);
    } catch (e) {
      console.error('[VFO] Mic PTT failed:', e.message);
    }
  }
  window.api.voiceMacroPtt(true);
}
function pttStop() {
  if (!pttDown) return;
  pttDown = false;
  pttBtn.classList.remove('active');
  pttBtn.textContent = 'PTT';
  window.api.voiceMacroPtt(false);
  // Stop mic
  if (pttMicStream) { pttMicStream.getTracks().forEach(t => t.stop()); pttMicStream = null; }
  if (pttMicCtx) { pttMicCtx.close().catch(() => {}); pttMicCtx = null; }
}

pttBtn.addEventListener('mousedown', (e) => { e.preventDefault(); pttStart(); });
pttBtn.addEventListener('mouseup', (e) => { e.preventDefault(); pttStop(); });
pttBtn.addEventListener('mouseleave', () => { if (pttDown) pttStop(); });

// LOG button
document.getElementById('log-btn-vfo').addEventListener('click', () => {
  window.api.openLogForm();
});

// TX state from radio (external PTT)
window.api.onTxState((state) => {
  if (state) {
    pttBtn.classList.add('active');
    pttBtn.textContent = 'TX';
  } else {
    pttBtn.classList.remove('active');
    pttBtn.textContent = 'PTT';
    pttDown = false;
  }
});

// --- CW Macros ---
async function loadCwMacros() {
  const s = await window.api.getSettings();
  const macros = s.cwMacros || [
    { label: 'CQ', text: 'CQ CQ CQ DE {MYCALL} {MYCALL} K' },
    { label: '599', text: '{call} UR 599 BK' },
    { label: '73', text: '73 DE {MYCALL} E E' },
    { label: 'AGN', text: 'AGN AGN PSE' },
    { label: 'TU', text: 'TU DE {MYCALL} K' },
  ];
  const row = document.getElementById('cw-macro-row');
  row.innerHTML = '';
  macros.forEach(m => {
    if (!m.label && !m.text) return;
    const btn = document.createElement('button');
    btn.className = 'cw-macro-btn';
    btn.textContent = m.label || '?';
    btn.title = m.text || '';
    btn.addEventListener('click', () => {
      // Basic macro expansion
      let text = m.text || '';
      text = text.replace(/\{MYCALL\}/gi, s.myCallsign || '');
      window.api.sendCwText(text);
    });
    row.appendChild(btn);
  });
  // Cancel button
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cw-cancel-btn';
  cancelBtn.textContent = 'STOP';
  cancelBtn.title = 'Cancel CW transmission';
  cancelBtn.addEventListener('click', () => window.api.cwCancel());
  row.appendChild(cancelBtn);
}
loadCwMacros().catch(e => console.error('[VFO] loadCwMacros error:', e));

// --- Voice Macros ---
let voicePlayingIdx = -1;
let voicePlaybackSource = null;
let voicePlaybackCtx = null;

async function loadVoiceMacros() {
  const s = await window.api.getSettings();
  const labels = s.voiceMacroLabels || ['CQ', 'ID', '73', '', ''];
  const filled = await window.api.voiceMacroList();
  const outputDeviceId = s.remoteAudioOutput || '';
  const row = document.getElementById('voice-macro-row');
  row.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    if (!labels[i] && filled.indexOf(i) === -1) continue;
    const btn = document.createElement('button');
    const hasFill = filled.indexOf(i) >= 0;
    btn.className = 'voice-macro-btn' + (hasFill ? '' : ' empty');
    btn.textContent = labels[i] || ('V' + (i + 1));
    btn.title = hasFill ? 'Click to play' : 'No recording';
    if (hasFill) {
      const idx = i;
      btn.addEventListener('click', () => {
        if (voicePlayingIdx === idx) { stopVoicePlayback(); return; }
        playVoiceMacro(idx, btn, outputDeviceId);
      });
    }
    row.appendChild(btn);
  }
  // Stop button
  const stopBtn = document.createElement('button');
  stopBtn.className = 'voice-stop-btn';
  stopBtn.textContent = 'STOP';
  stopBtn.title = 'Stop voice playback';
  stopBtn.addEventListener('click', () => stopVoicePlayback());
  row.appendChild(stopBtn);
}

async function playVoiceMacro(idx, btn, outputDeviceId) {
  stopVoicePlayback();
  const base64 = await window.api.voiceMacroLoad(idx);
  if (!base64) return;
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);

  voicePlaybackCtx = new AudioContext();
  if (voicePlaybackCtx.state === 'suspended') await voicePlaybackCtx.resume();
  if (outputDeviceId && voicePlaybackCtx.setSinkId) {
    try { await voicePlaybackCtx.setSinkId(outputDeviceId); } catch {}
  }
  voicePlaybackCtx.decodeAudioData(bytes.buffer, (audioBuffer) => {
    voicePlayingIdx = idx;
    btn.classList.add('active');
    voicePlaybackSource = voicePlaybackCtx.createBufferSource();
    voicePlaybackSource.buffer = audioBuffer;
    voicePlaybackSource.connect(voicePlaybackCtx.destination);
    window.api.voiceMacroPtt(true);
    voicePlaybackSource.start(0);
    voicePlaybackSource.onended = () => stopVoicePlayback();
  });
}

function stopVoicePlayback() {
  if (voicePlaybackSource) { try { voicePlaybackSource.stop(); } catch {} voicePlaybackSource = null; }
  if (voicePlaybackCtx) { voicePlaybackCtx.close().catch(() => {}); voicePlaybackCtx = null; }
  window.api.voiceMacroPtt(false);
  voicePlayingIdx = -1;
  document.querySelectorAll('.voice-macro-btn.active').forEach(b => b.classList.remove('active'));
}

loadVoiceMacros().catch(e => console.error('[VFO] loadVoiceMacros error:', e));

// --- Audio Monitor ---
const audioBtn = document.getElementById('audio-btn');
let audioMonitorCtx = null;
let audioMonitorStream = null;
let audioMonitorGain = null;
let audioMonitorActive = false;
let audioMonitorMuted = false;

async function startAudioMonitor() {
  if (audioMonitorCtx) return;
  try {
    const s = await window.api.getSettings();
    const constraints = {
      channelCount: 1,
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
    };
    if (s.remoteAudioInput) constraints.deviceId = { exact: s.remoteAudioInput };
    audioMonitorStream = await navigator.mediaDevices.getUserMedia({ audio: constraints });
    audioMonitorCtx = new AudioContext();
    if (audioMonitorCtx.state === 'suspended') await audioMonitorCtx.resume();
    const source = audioMonitorCtx.createMediaStreamSource(audioMonitorStream);
    audioMonitorGain = audioMonitorCtx.createGain();
    audioMonitorGain.gain.value = audioMonitorMuted ? 0 : 1;
    source.connect(audioMonitorGain);
    audioMonitorGain.connect(audioMonitorCtx.destination);
    audioMonitorActive = true;
    updateAudioBtn();
  } catch (e) {
    console.error('[VFO] Audio monitor failed:', e.message);
    audioMonitorActive = false;
    updateAudioBtn();
  }
}

function stopAudioMonitor() {
  if (audioMonitorStream) { audioMonitorStream.getTracks().forEach(t => t.stop()); audioMonitorStream = null; }
  if (audioMonitorCtx) { audioMonitorCtx.close().catch(() => {}); audioMonitorCtx = null; }
  audioMonitorGain = null;
  audioMonitorActive = false;
  updateAudioBtn();
}

function updateAudioBtn() {
  if (!audioMonitorActive) {
    audioBtn.textContent = '\u{1F508}'; // speaker low
    audioBtn.className = 'audio-btn';
    audioBtn.title = 'Click to listen to radio audio';
  } else if (audioMonitorMuted) {
    audioBtn.textContent = '\u{1F507}'; // speaker muted
    audioBtn.className = 'audio-btn muted';
    audioBtn.title = 'Muted — click to unmute';
  } else {
    audioBtn.textContent = '\u{1F50A}'; // speaker high
    audioBtn.className = 'audio-btn active';
    audioBtn.title = 'Listening — click to mute';
  }
}

audioBtn.addEventListener('click', async () => {
  if (!audioMonitorActive) {
    // First click: start monitoring
    await startAudioMonitor();
  } else if (!audioMonitorMuted) {
    // Second click: mute
    audioMonitorMuted = true;
    if (audioMonitorGain) audioMonitorGain.gain.value = 0;
    updateAudioBtn();
  } else {
    // Third click: unmute
    audioMonitorMuted = false;
    if (audioMonitorGain) audioMonitorGain.gain.value = 1;
    updateAudioBtn();
  }
});

// Long press or right-click to stop monitoring entirely
audioBtn.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  stopAudioMonitor();
  audioMonitorMuted = false;
});

// --- Theme ---
window.api.onTheme((theme) => {
  document.documentElement.setAttribute('data-theme', theme);
});

// --- Operator info (tuned spot) ---
const opInfoEl = document.getElementById('op-info');

window.api.onTunedSpot((spot) => {
  if (!spot || !spot.callsign) {
    opInfoEl.innerHTML = '';
    return;
  }
  let html = '<span class="op-call">' + esc(spot.callsign) + '</span>';
  // Name: "Nickname Last" or "First Last"
  if (spot.displayName) {
    html += '<br><span class="op-detail">' + esc(spot.displayName) + '</span>';
  }
  // Country + Grid on one line
  const locParts = [];
  if (spot.country) {
    locParts.push(spot.country === 'United States' ? 'USA' : spot.country);
  }
  if (spot.grid) locParts.push(spot.grid);
  if (locParts.length) html += '<br><span class="op-detail">' + esc(locParts.join(' / ')) + '</span>';
  // Park ref + name
  if (spot.reference) html += '<br><span class="op-ref">' + esc(spot.reference) + '</span>';
  if (spot.parkName) html += '<br><span class="op-detail">' + esc(spot.parkName) + '</span>';
  opInfoEl.innerHTML = html;
});

// --- Solar data ---
window.api.onSolarData((d) => {
  const sfiEl = document.getElementById('sv-sfi');
  const kEl = document.getElementById('sv-k');
  const aEl = document.getElementById('sv-a');
  if (d.sfi != null) {
    sfiEl.textContent = d.sfi;
    sfiEl.className = 'solar-val' + (d.sfi >= 150 ? '' : d.sfi >= 100 ? '' : d.sfi >= 70 ? ' warn' : ' bad');
  }
  if (d.kIndex != null) {
    kEl.textContent = d.kIndex;
    kEl.className = 'solar-val' + (d.kIndex <= 2 ? '' : d.kIndex <= 4 ? ' warn' : ' bad');
  }
  if (d.aIndex != null) {
    aEl.textContent = d.aIndex;
    aEl.className = 'solar-val' + (d.aIndex <= 7 ? '' : d.aIndex <= 20 ? ' warn' : ' bad');
  }
});

// --- Init ---
loadProfiles().catch(e => console.error('[VFO] loadProfiles error:', e));
loadWidgets().catch(e => console.error('[VFO] loadWidgets error:', e));
</script>
