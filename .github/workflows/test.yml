name: Test

# Runs on every push to master + every PR. Fast (~1 min) — pure-JS
# regression suite for JTCAT FT8/FT4/FT2 state machine, decode
# classifier, callsign heuristic, mode handling, and the pre-encode
# race fix. No Electron, no native modules, no live radio.
#
# See test/jtcat-test.js for what's covered and
# memory/project_jtcat_regression_invariants.md for the documented
# WSJT-X-parity contract these tests enforce.
#
# To gate merges on this passing, enable branch protection in
# GitHub Settings → Branches → master → "Require status checks
# to pass before merging" and tick the "jtcat-tests" job below.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  jtcat-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run JTCAT regression suite
        run: node test/jtcat-test.js
      - name: Run SSTV regression suite
        run: node test/sstv-test.js
      - name: Run SSTV PSNR-quality matrix
        run: node test/sstv-quality-test.js
      - name: Run SSTV live-engine E2E + real-world front door
        run: node test/sstv-e2e-test.js
      - name: Run SSTV ingress feed-gate table tests
        run: node test/sstv-feed-gate-test.js
      - name: Run log-comment suite
        run: node test/log-comment-test.js
      - name: Run rig-family suite
        run: node test/rig-family-test.js
      - name: Run DX cluster login suite
        run: node test/dxcluster-login-test.js
      - name: Run settings-secrets suite
        run: node test/settings-secrets-test.js
      - name: Run contest-history suite
        run: node test/contest-history-test.js
      - name: Run SmartSDR reconnect suite
        run: node test/smartsdr-reconnect-test.js
      - name: Run watchlist-groups suite
        run: node test/watchlist-groups-test.js
      - name: Run event-decode-match suite
        run: node test/event-decode-match-test.js

  # The release workflow installs with npm ci (lockfile-pinned), which fails
  # hard if package.json and package-lock.json drift apart. Catch that on the
  # push that introduces the drift instead of at release-tag time.
  lockfile-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # same as release.yml
      - name: npm ci (verifies package-lock.json is in sync)
        run: npm ci --no-audit --no-fund
